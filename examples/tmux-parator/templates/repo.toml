id = "repo"
name = "Repository"
session_name = "{workspace_name}-dev"
focus = "{window_prefix}.main.editor"
description = "Three-window repository workspace with nested panes."
chip = "r"
window_indicators = [" shell", " git", "󰇥 files", "󰎚 scratch"]
enabled = true
match = ["~/code/repos/*", "~/work/*"]

[[parameters]]
name = "editor"
prompt = "Editor"
options = ["nvim", "vim"]
default = "nvim"

[[parameters]]
name = "agent"
prompt = "Coding agent"
options = ["codex", "opencode", "none"]
default = "codex"

[variables]
window_prefix = "{session_name}-shell"

[[hooks.before_create_command]]
run = "git fetch --quiet"
kinds = ["repo"]

[[hooks.before_create_script]]
run = "setup.sh"
kinds = ["subdir"]

[[hooks.after_create_command]]
run = "echo ready"

[[hooks.after_create_script]]
run = "notes.sh"
kinds = ["repo"]

[[windows]]
name = "{window_prefix}"
focus = "main.editor"

[windows.layout]
type = "columns"
sizes = [25, 50, 25]
children = ["left", "main", "right"]

[windows.layout.left]
type = "pane"
path = "."
command = ["git status --short", "git branch --show-current"]

[windows.layout.main]
type = "rows"
sizes = [80, 20]
children = ["editor", "tests"]

[windows.layout.main.editor]
type = "pane"
path = "."
command = "{editor} ."

[windows.layout.main.tests]
type = "pane"
path = "."
command = "go test ./..."

[windows.layout.right]
type = "pane"
path = "."
command = "git log --oneline -5"

[[windows]]
name = "agent"
when = '{agent} != "none"'

[windows.layout]
type = "pane"
name = "agent"
path = "."
command = "{agent}"

[[windows]]
name = "git"

[windows.layout]
type = "pane"
name = "lazygit"
path = "."
command = "lazygit"

[[windows]]
name = "files"

[windows.layout]
type = "pane"
name = "yazi"
path = "."
command = "yazi"
command_mode = "wrapper"

[[windows]]
name = "scratch"

[windows.layout]
type = "pane"
name = "notes"
path = "docs"
script = ["setup.sh", "notes.sh"]
