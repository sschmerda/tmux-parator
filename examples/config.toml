[ui]
theme = "shades-of-purple"
popup_width = "90%"
popup_height = "90%"

[ui.dialogs.small]
width = 72
height = 9

[ui.dialogs.panel]
width = 88
height = 0

[ui.keys.browse]
quit = ["ctrl+c", "esc"]
command_palette = ["ctrl+g"]
help = ["ctrl+_"]
open_selected = ["enter"]
open_last_session = ["ctrl+@"]
kill_session = ["ctrl+k"]
rename_session = ["ctrl+n"]
new_session = ["ctrl+s"]
path_search = ["ctrl+t"]
reload = ["ctrl+r"]
toggle_hidden = ["alt+h", "meta+h"]
toggle_ignored = ["alt+i", "meta+i"]
up = ["up"]
down = ["down"]
jump_next_section = ["tab"]
jump_previous_section = ["shift+tab"]
delete_char = ["backspace", "ctrl+h"]
delete_word = ["alt+backspace"]
clear_input = ["ctrl+u", "meta+backspace"]

[ui.keys.path_search]
close = ["ctrl+t", "esc"]
command_palette = ["ctrl+g"]
help = ["ctrl+_"]
open_selected = ["enter"]
open_last_session = ["ctrl+@"]
open_typed = ["ctrl+p"]
create_typed = ["ctrl+a"]
cycle_root = ["ctrl+o"]
reload = ["ctrl+r"]
toggle_hidden = ["alt+h", "meta+h"]
toggle_ignored = ["alt+i", "meta+i"]
up = ["up"]
down = ["down"]
complete_next = ["tab"]
complete_previous = ["shift+tab"]
accept_completion = ["left", "right"]
delete_char = ["backspace", "ctrl+h"]
delete_word = ["alt+backspace"]
clear_input = ["ctrl+u", "meta+backspace"]

[ui.keys.commands]
close = ["esc", "ctrl+g"]
help = ["ctrl+_"]
run_selected = ["enter"]
up = ["up"]
down = ["down"]
delete_char = ["backspace", "ctrl+h"]
delete_word = ["alt+backspace"]
clear_input = ["ctrl+u", "meta+backspace"]

[ui.keys.help]
close = ["esc", "ctrl+_"]
up = ["up", "k"]
down = ["down", "j"]

[ui.keys.confirm]
yes = ["y", "Y"]
no = ["n", "N", "esc"]
left = ["left", "up", "shift+tab"]
right = ["right", "down", "tab"]
submit = ["enter"]

[ui.glyphs]
repo = "îœ‚"
subdir = "ïƒ‰"
path = "ó°‰‹"
worktree = "ó°™…"
manual = "î¯ˆ"

[ui.glyph_colors]
repo = "#f14e32"
subdir = "#7aa2f7"
path = "#7dcfff"
worktree = "#9ece6a"
manual = "#a599e9"

[ui.columns.chip]
show = true
width = 12
max_width = 12

[ui.columns.root]
show = true
width = 12
max_width = 20

[ui.columns.name]
show = true
width = 28
max_width = 40

[ui.columns.path]
show = true
width = 0
max_width = 0
include_root = true

[discovery]
backend = "auto"
skip_hidden = true
skip_gitignored = true
skip_dirs = ["node_modules", "vendor", "dist", "build"]

[path_search]
enabled = true
backend = "auto"
roots = ["~"]
max_depth = 12
skip_hidden = true
skip_gitignored = true
skip_dirs = ["node_modules", ".git", "vendor", "dist", "build", ".cache", ".venv", "__pycache__"]
limit = 5000

[[roots]]
name = "projects"
path = "~/projects"
kind = "repo"
glyph = "îœ‚"
glyph_color = "#f14e32"
depth = 1
max_depth = 4
skip_hidden = true
skip_gitignored = true
skip_dirs = ["node_modules", "vendor", "dist", "build"]

[[roots]]
name = "scratch"
path = "~/scratch"
kind = "subdir"
glyph = "ïƒ‰"
glyph_color = "#7aa2f7"
depth = 2
max_depth = 0
skip_hidden = true
skip_gitignored = true
skip_dirs = ["node_modules", "vendor", "dist", "build"]
